apiVersion: v1
kind: Pod
metadata:
  name: todoapp
  namespace: mateapp
  labels:
    app: todoapp
spec:
  containers:
  - name: todoapp
    image: ikulyk404/todoapp:3.0.0
    env:
      - name: PYTHONUNBUFFERED
        valueFrom:
          configMapKeyRef:
            name: app-config
            key: PYTHONUNBUFFERED
      - name: SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: app-secrets
            key: SECRET_KEY
    ports:
    - containerPort: 8080
    livenessProbe:
      httpGet:
        path: /api/health
        port: 8080
      initialDelaySeconds: 60
      periodSeconds: 5
    readinessProbe:
      httpGet:
        path: /api/ready
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5

